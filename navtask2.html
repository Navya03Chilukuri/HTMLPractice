<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
        }
        nav{
            height:100px;
            display: flex;
            justify-content: space-between;
            align-items: center;

        }
        #menublock,#logoblock{
            height:100px;

            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #menublock>a{
            text-decoration: none;
            color: black;
        }
        #logoblock img{
            display:flex;
            justify-content: space-evenly;
            align-items: center;
            height:100px;
            mix-blend-mode: multiply;
        }
        #photoblock{
          height:85vh;
            background-color:lightgrey;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #child1,#child2,#child3{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height:300px;
            width: 300px;
            background-color: white;
            border-radius:5px;
            box-shadow:0px 0px 12px rgba(0,0,0,0.5);
        }

        #photoblock img{
            height:300px;
        }
    </style>
</head>
